version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - techfest-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: techfest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - techfest-net

  redis:
    image: redis:7-alpine
    networks:
      - techfest-net

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - techfest-net

volumes:
  pgdata:

networks:
  techfest-net:
